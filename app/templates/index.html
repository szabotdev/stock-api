<!DOCTYPE html>
<html lang="en">
<head>
  <title>Stock API — Ticker Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { accent: '#7dd3fc' }
        }
      }
    }
  </script>
</head>
<body class="bg-neutral-950 text-neutral-200 min-h-screen flex justify-center items-start px-4 py-16">

  <div class="w-full max-w-md bg-neutral-900 border border-neutral-800 rounded-2xl p-8 shadow-xl">

    <!-- Header -->
    <h1 class="text-xl font-semibold text-white mb-1">📈 Stock API</h1>
    <p class="text-sm text-neutral-500 mb-8">Manage tickers shown on your CYD display</p>

    <!-- Ticker list -->
    <ul class="space-y-2 mb-6" id="ticker-list">
      {% if tickers %}
        {% for t in tickers %}
        <li class="flex items-center justify-between bg-neutral-800 border border-neutral-700
                   rounded-xl px-4 py-3">
          <span class="font-semibold text-sky-300 tracking-wide">{{ t.label }}</span>
          <button onclick="remove('{{ t.symbol }}')"
                  class="text-xs text-neutral-500 border border-neutral-600 rounded-lg
                         px-3 py-1 hover:border-red-400 hover:text-red-400 transition-colors">
            Remove
          </button>
        </li>
        {% endfor %}
      {% else %}
        <li class="text-neutral-600 italic py-3">No tickers yet — add one below</li>
      {% endif %}
    </ul>

    <!-- Add row -->
    <div class="flex gap-3">
      <input id="newTicker" type="text"
             placeholder="e.g. AAPL or VWCE.DE"
             onkeydown="if(event.key==='Enter') add()"
             class="flex-1 bg-neutral-800 border border-neutral-700 text-white
                    rounded-xl px-4 py-2.5 text-sm uppercase placeholder-neutral-600
                    focus:outline-none focus:border-sky-400 transition-colors">
      <button onclick="add()"
              class="bg-sky-300 text-black font-semibold rounded-xl px-5 py-2.5
                     text-sm hover:bg-sky-400 transition-colors">
        Add
      </button>
    </div>

    <!-- Status message -->
    <p id="msg" class="text-sm text-center mt-4 min-h-5"></p>

    <!-- Footer hint -->
    <p class="text-xs text-neutral-600 text-center mt-6">
      Changes apply on the CYD's next refresh cycle
    </p>

  </div>

  <script>
    function showMsg(text, isError = false) {
      const el = document.getElementById('msg');
      el.className = `text-sm text-center mt-4 min-h-5 ${isError ? 'text-red-400' : 'text-green-400'}`;
      el.textContent = text;
      setTimeout(() => el.textContent = '', 3000);
    }

    function remove(ticker) {
      fetch('/tickers/' + ticker, { method: 'DELETE' })
        .then(r => r.json())
        .then(() => { showMsg(ticker + ' removed'); location.reload(); })
        .catch(() => showMsg('Error removing ticker', true));
    }

    function add() {
      const val = document.getElementById('newTicker').value.trim().toUpperCase();
      if (!val) return;
      fetch('/tickers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ symbol: val })
      })
      .then(r => r.json())
      .then(d => {
        if (d.error) { showMsg(d.error, true); return; }
        showMsg(val + ' added!');
        location.reload();
      })
      .catch(() => showMsg('Error adding ticker', true));
    }
  </script>

</body>
</html>
